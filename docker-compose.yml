services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    platform: linux/${DOCKER_ARCH:-amd64}
    container_name: hermes-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TERMINAL_ENV=docker
      - HERMES_DASHBOARD=1
    volumes:
      - ./.hermes-agent:/opt/data
    ports:
      - "127.0.0.1:9119:9119"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        grep -qF '/opt/hermes/.venv/bin/activate' /root/.bashrc 2>/dev/null || cat >> /root/.bashrc <<'BASHRC_EOF'

        # Auto-activate hermes venv for interactive shells
        if [ -f /opt/hermes/.venv/bin/activate ] && [ -z "$$VIRTUAL_ENV" ]; then
            . /opt/hermes/.venv/bin/activate
        fi
        BASHRC_EOF
        exec /opt/hermes/docker/entrypoint.sh gateway run
    stdin_open: true
    tty: true
